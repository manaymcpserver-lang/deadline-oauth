<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeadLine - Linear OAuth</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        a {
            color: #60a5fa;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Connecting to DeadLine...</h2>
        <p>Redirecting you back to the app</p>
        <div id="manual-link" style="display: none; margin-top: 1rem;">
            <p>Not redirected automatically?</p>
            <a id="link" href="#">Tap here to open DeadLine</a>
        </div>
    </div>
    <script>
        var appUrl = 'deadline://oauth/callback/linear' + window.location.search;
        document.getElementById('link').href = appUrl;

        // Wait for the page to fully load + settle before attempting the redirect.
        // Firing during parsing or immediately on load is silently dropped by
        // WKWebView in ASWebAuthenticationSession.
        window.onload = function() {
            setTimeout(function() { window.location.href = appUrl; }, 500);
            setTimeout(function() { window.location.href = appUrl; }, 1500);
            setTimeout(function() {
                document.getElementById('manual-link').style.display = 'block';
            }, 2500);
        };
    </script>
</body>
</html>
