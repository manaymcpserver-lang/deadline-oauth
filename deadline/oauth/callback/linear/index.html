<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeadLine - Linear OAuth</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #fallback {
            display: none;
            text-align: center;
            padding: 16px;
        }
        a {
            color: #8ab4ff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
    <script>
        (function redirectToApp() {
            const params = window.location.search || "";
            const appUrl = "deadline://oauth/callback/linear" + params;
            window.location.replace(appUrl);
            setTimeout(function () {
                const fallback = document.getElementById("fallback");
                const link = document.getElementById("fallback-link");
                if (!fallback || !link) return;
                link.href = appUrl;
                fallback.style.display = "block";
            }, 1000);
        })();
    </script>
</head>
<body>
    <div id="fallback">
        <p>Opening DeadLine…</p>
        <p><a id="fallback-link" href="#">Tap here if it did not open automatically</a></p>
    </div>
</body>
</html>
