<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeadLine - Linear Connected</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 2rem 1.25rem;
            max-width: 420px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 1rem;
        }
        .button {
            display: inline-block;
            margin-top: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            background: #3b82f6;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .muted {
            margin-top: 0.75rem;
            color: rgba(255,255,255,0.75);
            font-size: 0.95rem;
        }
        .text-link {
            color: #60a5fa;
            text-decoration: none;
        }
        .text-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Connection Complete</h2>
        <p>Return to DeadLine to finish syncing your Linear tasks.</p>
        <a id="open-app" class="button" href="#">Open DeadLine</a>
        <div class="muted">
            If nothing happens, close this page and go back to DeadLine.
            <br />
            <a class="text-link" href="https://deadline.codeconductor.pro/support/">Need help?</a>
        </div>
    </div>
    <script>
        const deepLink = 'deadline://oauth/callback/linear' + window.location.search;
        const openAppButton = document.getElementById('open-app');
        openAppButton.href = deepLink;

        // Auto-attempt app return on iOS while keeping a manual fallback button.
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        if (isIOS) {
            setTimeout(() => {
                window.location.href = deepLink;
            }, 40);
        }
    </script>
</body>
</html>
