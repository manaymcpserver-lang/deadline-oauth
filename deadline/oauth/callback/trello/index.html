<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeadLine - Trello OAuth</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        a {
            color: #60a5fa;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
    <script>
        // Trello returns token in URL fragment (#token=...)
        const params = window.location.search || '';
        const hash = window.location.hash || '';

        // Handle both query params and fragment
        let appUrl = 'deadline://oauth/callback/trello';
        if (hash && hash.includes('token=')) {
            // Convert fragment to query param for the app
            appUrl += '?' + hash.substring(1);
        } else if (params) {
            appUrl += params;
        }

        window.location.href = appUrl;
        setTimeout(function() {
            document.getElementById('manual-link').style.display = 'block';
        }, 2000);
    </script>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Connecting to DeadLine...</h2>
        <p>Redirecting you back to the app</p>
        <div id="manual-link" style="display: none; margin-top: 1rem;">
            <p>Not redirected automatically?</p>
            <a id="link" href="#">Click here to open DeadLine</a>
        </div>
    </div>
    <script>
        const hash = window.location.hash || '';
        const params = window.location.search || '';
        let linkUrl = 'deadline://oauth/callback/trello';
        if (hash && hash.includes('token=')) {
            linkUrl += '?' + hash.substring(1);
        } else if (params) {
            linkUrl += params;
        }
        document.getElementById('link').href = linkUrl;
    </script>
</body>
</html>
